<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drive Simulator 3D</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="info">
    <p class="instructions">Drag to navigate • Scroll to zoom • Move with WASD or arrow keys</p>
  </div>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading model...</p>
  </div>
  <div class="buttons-container">
    <a
      href="https://sebas-dev.vercel.app/"
      target="_blank"
      rel="noopener noreferrer"
      class="creator-link"
    >
      ✨ Created by Sebastián Vásquez
    </a>
    <a
      href="https://github.com/sebastianvasquezechavarria1234/drive-simulator-3d-thre.js"
      target="_blank"
      rel="noopener noreferrer"
      class="github-link"
    >
      💻 View Source Code
    </a>
  </div>
  <div class="controls-panel">
    <div class="control-row">
      <div class="control-btn" id="btn-w">W</div>
    </div>
    <div class="control-row">
      <div class="control-btn" id="btn-a">A</div>
      <div class="control-btn" id="btn-s">S</div>
      <div class="control-btn" id="btn-d">D</div>
    </div>
  </div>
  
  <canvas id="scene"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
